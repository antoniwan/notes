name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Keeps regenerated social JPG/PNG warm between runs until they are committed to git.
      - name: Restore social derivatives cache
        uses: actions/cache@v4
        with:
          path: public/social
          key: ${{ runner.os }}-social-images-${{ hashFiles('public/**/*.avif', 'scripts/generate-social-images.js', 'src/data/socialImageFingerprints.json') }}
          restore-keys: |
            ${{ runner.os }}-social-images-

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run format check
        run: pnpm run format:check

      - name: Run Astro check
        run: pnpm run check

      - name: Run ESLint
        run: pnpm run lint

      - name: Build project
        run: pnpm run build
